<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- ── Orbit ring: back arc (behind sphere) ── -->
  <ellipse cx="16" cy="16" rx="14.5" ry="5.2"
           transform="rotate(-33 16 16)"
           fill="none" stroke="#b07808" stroke-width="2.4"
           stroke-dasharray="31 32" stroke-dashoffset="0"/>

  <!-- ── Blue sphere ── -->
  <!-- Base -->
  <circle cx="16" cy="16" r="12" fill="#1155cc"/>
  <!-- Radial highlight (top-left glow) -->
  <circle cx="16" cy="16" r="12" fill="#3a80ff" opacity="0.35"/>
  <ellipse cx="12.5" cy="10.5" rx="6.5" ry="4.5" fill="#80b8ff" opacity="0.55"/>
  <!-- Limb darkening (bottom-right shadow) -->
  <circle cx="19" cy="20" r="7" fill="#062080" opacity="0.38"/>

  <!-- ── White "e" shape ── -->
  <!-- Outer body: C-curve wrapping left/bottom/top, open to right -->
  <path d="
    M 21.5 12.5
    Q 20.5 8.5 16 8
    Q 10 7.5 8 13
    Q 6.5 17 8.5 21
    Q 11 25 16.5 24.5
    Q 21 24 22.5 20.5
    L 20 19.5
    Q 19 22.5 15.5 22.5
    Q 11 22.5 9.5 19
    Q 8.5 16.5 9.5 14.5
    L 22 14.5
    Q 22.5 13.5 21.5 12.5
    Z
  " fill="white"/>
  <!-- Inner counter (hollow of the e — punch out with sphere colour) -->
  <path d="
    M 9.5 14.5
    Q 9.5 11 13 10
    Q 17 9 20 12
    Q 21.5 13.5 21 14.5
    Z
  " fill="#1155cc"/>
  <!-- Restore limb darkening inside counter -->
  <path d="
    M 16 9.5
    Q 20 10 21 14.5
    L 18 14.5
    Q 17.5 11.5 14 11
    Z
  " fill="#062080" opacity="0.25"/>

  <!-- ── Orbit ring: front arc (in front of sphere) ── -->
  <ellipse cx="16" cy="16" rx="14.5" ry="5.2"
           transform="rotate(-33 16 16)"
           fill="none" stroke="#f0c020" stroke-width="2.4"
           stroke-dasharray="31 32" stroke-dashoffset="31"/>
  <!-- Bright specular spot on ring -->
  <ellipse cx="16" cy="16" rx="14.5" ry="5.2"
           transform="rotate(-33 16 16)"
           fill="none" stroke="#fff8d0" stroke-width="0.8" opacity="0.6"
           stroke-dasharray="5 58" stroke-dashoffset="27"/>

</svg>
