<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Camera body -->
  <rect x="2" y="10" width="28" height="18" rx="3" fill="#282828"/>
  <!-- Top edge highlight -->
  <rect x="2" y="10" width="28" height="3" rx="3" fill="#404040"/>
  <!-- Viewfinder hump -->
  <rect x="9" y="7" width="10" height="5" rx="2" fill="#202020"/>
  <!-- Flash -->
  <rect x="3" y="12" width="5" height="3" rx="1" fill="#ffee44"/>
  <rect x="3" y="12" width="5" height="1" rx="1" fill="white" opacity="0.5"/>
  <!-- Lens outer ring (chrome) -->
  <circle cx="16" cy="19" r="7.5" fill="#505050"/>
  <!-- Lens body -->
  <circle cx="16" cy="19" r="6.2" fill="#303030"/>
  <!-- Lens elements -->
  <circle cx="16" cy="19" r="5" fill="#181818"/>
  <circle cx="16" cy="19" r="3.5" fill="#242424"/>
  <circle cx="16" cy="19" r="2.2" fill="#0a0a0a"/>
  <!-- Lens glare -->
  <circle cx="13.5" cy="16.5" r="1.4" fill="white" opacity="0.28"/>
  <circle cx="18" cy="21" r="0.6" fill="white" opacity="0.15"/>
  <!-- Shutter button -->
  <circle cx="25" cy="12" r="2.2" fill="#383838"/>
  <circle cx="25" cy="12" r="1.3" fill="#555"/>
</svg>
