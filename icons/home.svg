<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Roof shadow -->
  <polygon points="16,3 31,17 1,17" fill="#903010"/>
  <!-- Roof -->
  <polygon points="16,2 30,16 2,16" fill="#c04020"/>
  <!-- Roof highlight -->
  <polygon points="16,4 28,16 4,16" fill="#e06040" opacity="0.3"/>
  <!-- Walls -->
  <rect x="4" y="15" width="24" height="14" fill="#e8d8a8"/>
  <!-- Wall highlight -->
  <rect x="4" y="15" width="24" height="2" fill="#f8ead0" opacity="0.5"/>
  <!-- Door -->
  <rect x="12" y="21" width="8" height="8" rx="1" fill="#7a4820"/>
  <!-- Door highlight -->
  <rect x="12" y="21" width="8" height="1.5" rx="1" fill="#9a6840" opacity="0.5"/>
  <!-- Door knob -->
  <circle cx="19.5" cy="25" r="0.9" fill="#d4a010"/>
  <!-- Left window -->
  <rect x="5" y="17" width="6" height="6" rx="0.5" fill="#88bbdd"/>
  <line x1="8" y1="17" x2="8" y2="23" stroke="white" stroke-width="0.8"/>
  <line x1="5" y1="20" x2="11" y2="20" stroke="white" stroke-width="0.8"/>
  <!-- Right window -->
  <rect x="21" y="17" width="6" height="6" rx="0.5" fill="#88bbdd"/>
  <line x1="24" y1="17" x2="24" y2="23" stroke="white" stroke-width="0.8"/>
  <line x1="21" y1="20" x2="27" y2="20" stroke="white" stroke-width="0.8"/>
  <!-- Chimney -->
  <rect x="23" y="6" width="4" height="7" fill="#904030"/>
</svg>
